<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KChat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
  html, body{
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
}

/* MAIN CHAT FULL SCREEN FIX */
#chat{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:none;
  flex-direction:column;
  height:100%;
}


/* IMPORTANT FIX */
body{
  overflow:hidden;
}

#chat{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:none;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow-y:auto;
}
body{
  margin:0;
  font-family:sans-serif;
  background:#ece5dd;
  height:100vh;
  overflow:hidden;
}

/* 🔥 SPLASH */
#splash{
position:fixed;
width:100%;
height:100vh;
background:#111;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
animation:fadeOut 0.5s ease 1.5s forwards;
}

.logo{
width:80px;height:80px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
margin-bottom:10px;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
}

/* CHAT */
#chat{
  display:none;
  height:100vh;
  flex-direction:column;
}

.header{
background:#075e54;
color:white;
padding:10px;
display:flex;
align-items:center;
}

.clearBtn{
margin-left:auto;
background:red;
border:none;
color:white;
padding:5px 10px;
border-radius:10px;
}

.status{font-size:12px;}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
padding:8px;
border-radius:8px;
margin:5px;
max-width:70%;
}

.me{background:#dcf8c6;align-self:flex-end;}
.other{background:white;}

.inputBox{
  display:flex;
  padding:10px;
  background:white;
}

.inputBox input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:20px;
background:#25D366;
color:white;
margin-left:5px;
}

.typing{
font-size:12px;
color:#555;
padding-left:10px;
}
  html, body{
  height:100%;
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:#ece5dd;
}

#chat{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  height: calc(var(--vh, 1vh) * 100);
}

.header{
  flex:0 0 auto;
}

.messages{
  flex:1 1 auto;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.inputBox{
  flex:0 0 auto;
  display:flex;
  padding:10px;
  background:white;
  
}
  /* reaction bar */
.reactBar{
  position:absolute;
  bottom:100%;
  left:10px;
  background:white;
  border-radius:20px;
  padding:6px 8px;
  display:flex;
  gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  z-index:5;
}

.reactBar span{
  font-size:18px;
}

.msg{
  position:relative;
}

/* show reactions under msg */
.reacts{
  font-size:14px;
  margin-top:4px;
}
</style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
<div class="logo">K</div>
<h2>Kabutar Chat</h2>
<p>Made by Bhanu</p>
</div>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>KChat</h2>
<input id="name" placeholder="Name"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Enter</button>
</div>
</div>

<!-- CHAT -->
<div id="chat">

<div class="header">
<div>
<div>KChat</div>
<div class="status" id="status"></div>
</div>
<button class="clearBtn" onclick="clearChat()">Clear</button>
</div>

<div class="messages" id="msgs"></div>
<div class="typing" id="typing"></div>

<div class="inputBox">
<input id="msg" placeholder="Message" oninput="typingSend()">
<button onclick="send()">Send</button>
</div>

</div>

<script>

// 🔥 SPLASH TIME CONTROL
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},1500);

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAiXvw84M5j_6o5FntyhWyhAetHE1P5fOQ",
  authDomain: "realtime-chat-web-app-688d4.firebaseapp.com",
  databaseURL: "https://realtime-chat-web-app-688d4-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
const password="43113";

// LOGIN
function login(){
let name=document.getElementById("name").value.trim();
let pass=document.getElementById("pass").value;

if(!name){alert("Enter name");return;}
if(pass!==password){alert("Wrong password");return;}

username=name;

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

// ONLINE STATUS
db.ref("status/"+username).set("online");
db.ref("status/"+username).onDisconnect().set("offline");
// SHOW STATUS (LIVE)
db.ref("status").on("child_changed",snap=>{
  let user = snap.key;
  let state = snap.val();

  if(user !== username){
    document.getElementById("status").innerText =
      state === "online" ? "🟢 Online" : "⚫ Offline";
  }
});

// ✅ First time load
db.ref("status").on("child_added",snap=>{
  let user = snap.key;
  let state = snap.val();

  if(user !== username){
    document.getElementById("status").innerText =
      state === "online" ? "🟢 Online" : "⚫ Offline";
  }
});

load();
}

// SEND
function send(){
let text=document.getElementById("msg").value;
if(!text.trim()) return;

db.ref("chat").push({
name:username,
msg:text,
seen:false
});

document.getElementById("msg").value="";
db.ref("typing/"+username).set("");
}

// LOAD + BLUE TICK + DELETE
function load(){
db.ref("chat").limitToLast(20).on("child_added",snap=>{
let d=snap.val();
let key=snap.key;

let div=document.createElement("div");
div.className="msg "+(d.name===username?"me":"other");

// ✔✔ BLUE TICK
let tick="";
if(d.name===username){
tick = d.seen
? `<span style="color:#34B7F1"> ✔✔</span>`
: `<span style="color:gray"> ✔</span>`;
}

div.innerHTML = d.msg + tick;

// DELETE FOR EVERYONE
div.onclick=()=>{
if(confirm("Delete for everyone?")){
db.ref("chat/"+key).remove();
}
};

document.getElementById("msgs").appendChild(div);
document.getElementById("msgs").scrollTop=999999;

// SEEN UPDATE
if(d.name!==username){
db.ref("chat/"+key).update({seen:true});
}
});
}

// CLEAR CHAT
function clearChat(){
if(confirm("Clear chat?")){
db.ref("chat").remove();
document.getElementById("msgs").innerHTML="";
}
}

// TYPING
function typingSend(){
db.ref("typing/"+username).set(username);

setTimeout(()=>{
db.ref("typing/"+username).set("");
},1000);
}

db.ref("typing").on("value",snap=>{
let data=snap.val();

for(let user in data){
if(user!==username && data[user]){
document.getElementById("typing").innerText=user+" is typing...";
return;
}
}
document.getElementById("typing").innerText="";
});
  function fixVH(){
  document.documentElement.style.setProperty(
    '--vh',
    `${window.innerHeight * 0.01}px`
  );
}
fixVH();
window.addEventListener('resize', fixVH);
  function showReactions(div,key){
  let old=document.getElementById("reactBar");
  if(old) old.remove();

  let bar=document.createElement("div");
  bar.className="reactBar";
  bar.id="reactBar";

  let emojis=["👍","❤️","😂","😮","😢","🙏"];

  emojis.forEach(e=>{
    let span=document.createElement("span");
    span.innerText=e;

    span.onclick=()=>{
      db.ref("chat/"+key+"/reacts/"+username).set(e);
      bar.remove();
    };

    bar.appendChild(span);
  });

  div.appendChild(bar);
  }

</script>

</body>
</html>
